name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ] # Triggers the pipeline on every push to the main branch
env:
  REGISTRY_URL: quay.io
  IMAGE_NAME: shrijandra/hello-app
  
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout Code
      uses: actions/checkout@v6
    - name: Login to Docker Hub
      shell: bash
      env:
        REG_USER: ${{ secrets.REGISTRY_USERNAME }}
        REG_PASS: ${{ secrets.REGISTRY_PASSWORD }}
      run: |
        # Omitting the registry URL defaults directly to Docker Hub
        echo "$REG_PASS" | docker login -u "$REG_USER" --password-stdin


